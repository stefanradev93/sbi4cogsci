project:
  type: website
  output-dir: _site

website:
  title: "<img src='images/graphics/sbi4cogsci-logo.png' height=60 />"
  navbar:
    pinned: true
    background: white
    foreground: "#111827"
    left:
      - href: index.qmd
        text: Overview
      - href: schedule.qmd
        text: Schedule
      - href: organizers.qmd
        text: Organizers
      - href: application.qmd
        text: Application
      - href: venue.qmd
        text: Venue
  page-footer:
    left: |
      <div class="footer-brand">
        <div class="footer-title">SBI4CogSci Summer School 2026</div>
        <div class="footer-meta">July 27-31, 2026</div>
      </div>
    center: |
      <img src="images/graphics/sbi4cogsci-icon.png" height="80" alt="SBI4CogSci icon" />
    right: |
      <div class="footer-funder">
        Supported by the <br><strong>William K. and Katherine W. Estes Fund</strong>
      </div>
format:
  html:
    theme: cosmo
    css: styles.css
    toc: false
    grid:
      body-width: 1000px
      margin-width: 0px
      gutter-width: 1.5rem
    smooth-scroll: true
    mainfont: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif
